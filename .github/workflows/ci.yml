name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # npm ci compiles better-sqlite3 from source; the ubuntu runner already
      # has the build toolchain.
      - run: npm ci
      - run: npm run lint
      - run: npm run test:node
      - run: npm run test:ui
      - run: npm run build
