services:
  feeding-tracker-dev:
    build: .
    container_name: baby-feeding-tracker-dev
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - DB_DIR=/data
      - DB_PATH=/data/feeding-tracker-dev.db
      - AUTH_REQUIRED=${AUTH_REQUIRED:-1}
      - AUTH_BYPASS=${AUTH_BYPASS:-0}
      - ALLOW_INSECURE_LOCAL_MODE=1
      - AUTH_ALLOWED_EMAILS=${AUTH_ALLOWED_EMAILS:-alex@example.test,test@example.test,parent@example.com,waldbauma686@gmail.com}
      - AUTH_ALLOWED_PHONES=${AUTH_ALLOWED_PHONES:-}
      - AUTH_BOOTSTRAP_PASSWORD=${AUTH_BOOTSTRAP_PASSWORD:-}
      # Dev defaults to the single TEXT_EMAIL_TO recipient from .env.smtp so
      # text-login can be tested without guessing a carrier gateway domain.
      # Set TEXT_LOGIN_SMS_DOMAIN explicitly only when testing a known carrier
      # email-to-SMS gateway for the entered phone number.
      - TEXT_LOGIN_SMS_DOMAIN=${TEXT_LOGIN_SMS_DOMAIN:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://dev.feedr.kjw.lol}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
      - NOTIFICATIONS_ENABLED=1
    env_file:
      - .env.gotify
      - path: .env.smtp
        required: false
    volumes:
      - ./data-dev:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
