services:
  feeding-tracker-dev:
    build: .
    container_name: baby-feeding-tracker-dev
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - DB_DIR=/data
      - DB_PATH=/data/feeding-tracker-dev.db
      - AUTH_REQUIRED=${AUTH_REQUIRED:-0}
      - AUTH_BYPASS=${AUTH_BYPASS:-0}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
      - NOTIFICATIONS_ENABLED=1
    env_file:
      - .env.gotify
      - path: .env.smtp
        required: false
    volumes:
      - ./data-dev:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
